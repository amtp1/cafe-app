<div class="topbar">
  <h1>Настройки</h1>
</div>

<div class="settings-section">
  <h3 class="settings-section-title">Отмена заказов</h3>
  <div class="settings-block">
    <p class="settings-desc">Кодовое слово запрашивается у официанта при смене статуса заказа на «Отменен». Задайте или измените его ниже.</p>
    <div class="settings-row">
      <label for="cancelCodeInput">Кодовое слово</label>
      <input type="text" id="cancelCodeInput" placeholder="Введите кодовое слово" autocomplete="off">
    </div>
    <button type="button" class="add-btn" onclick="saveCancelCode()">Сохранить</button>
  </div>
</div>
