<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заказ</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="appBox">
    <div class="app">
    <h2 id="pageTitle" class="page-title">🍽 POS Заказы</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('create')">Создать заказ</button>
        <button class="tab-btn" onclick="openTab('history')">История</button>
        <button class="tab-btn" onclick="openTab('profile')">Профиль</button>
    </div>

    <!-- TAB CREATE -->
    <div id="create" class="tab-content active">
        <div class="layout">
        <div class="left">
            <div class="table-select-block">
                <div class="table-select-row">
                    <label>Зал</label>
                    <select id="hallSelect">
                        <option value="">— Выберите зал —</option>
                    </select>
                </div>
                <div class="table-select-row">
                    <label>Стол</label>
                    <select id="tableSelect">
                        <option value="">— Выберите стол —</option>
                    </select>
                </div>
                <div class="table-select-row table-seats-row">
                    <label>Количество мест</label>
                    <span class="table-seats" id="tableSeats">—</span>
                </div>
            </div>

            <label>Блюдо</label>
            <div class="dish-select">
                <input id="dishInput" placeholder="Выберите блюдо" autocomplete="off">
                <div id="dishDropdown" class="dish-dropdown"></div>
            </div>

            <label>Количество</label>
            <input id="qty" type="number" min="1" value="1">

            <label>Сумма блюда</label>
            <input id="itemSum" disabled>

            <button class="add-btn" onclick="addItem()">➕ Добавить</button>
            <button class="save-btn" onclick="saveOrder()">💾 Сохранить заказ</button>
        </div>

        <div class="right">
            <h3>🧾 Выбранные блюда</h3>
            <ul class="items" id="items"></ul>
            <div class="total">
            💰 Итого: <span id="total">0</span>
            </div>
        </div>
        </div>
    </div>

    <!-- TAB PROFILE -->
    <div id="profile" class="tab-content">
        <div class="profile-page">
            <div class="profile-avatar" id="profileAvatar">&#129332;</div>
            <div class="profile-main">
                <h1 class="profile-name" id="profileName">—</h1>
                <p class="profile-date" id="profileDate">Дата регистрации: —</p>
                <button type="button" class="profile-logout" id="profileLogoutBtn">Выйти</button>
            </div>
        </div>
    </div>

    <!-- TAB HISTORY -->
    <div id="history" class="tab-content">
        <div class="history-tools">
            <input
                id="searchWaiter"
                placeholder="Поиск официанта..."
                oninput="loadHistory()"
            >

            <select id="statusFilter" onchange="loadHistory()">
                <option value="">Все</option>
                <option value="В работе">В работе</option>
                <option value="Готово">Готово</option>
                <option value="Оплачен">Оплачен</option>
                <option value="Отменен">Отменен</option>
            </select>
        </div>

        <div id="reportSummary" class="history-report"></div>
        <div class="history-list" id="ordersHistory"></div>
    </div>
</div>

<script src="/js/script.js"></script>
</body>
</html>
